<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MFCMouseEffect Settings</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="t">MFCMouseEffect Settings</div>
        <div class="s">Local UI · instant apply · saved to config.json</div>
      </div>
      <div class="btns">
        <button id="btnReload">Reload</button>
        <button id="btnSave" class="primary">Save & Apply</button>
      </div>
    </div>

    <div class="row">
      <div class="card" id="general">
        <h3>General</h3>
        <div class="grid">
          <label>Language</label>
          <select id="ui_language"></select>
          <label>Theme</label>
          <select id="theme"></select>
        </div>
      </div>

      <div class="card" id="active">
        <h3>Active Effects</h3>
        <div class="grid">
          <label>Click</label><select id="click"></select>
          <label>Trail</label><select id="trail"></select>
          <label>Scroll</label><select id="scroll"></select>
          <label>Hold</label><select id="hold"></select>
          <label>Hover</label><select id="hover"></select>
        </div>
      </div>
    </div>

    <div class="row" style="margin-top:12px">
      <div class="card" id="text">
        <h3>Text Content (Click/Text)</h3>
        <div class="grid">
          <label>Comma separated</label>
          <textarea id="text_content" placeholder="happy,healthy"></textarea>
        </div>
      </div>

      <div class="card" id="trail">
        <h3>Trail Tuning</h3>
        <div class="grid">
          <label>Style preset</label>
          <select id="trail_style">
            <option value="default">default</option>
            <option value="snappy">snappy</option>
            <option value="long">long</option>
            <option value="cinematic">cinematic</option>
            <option value="custom">custom</option>
          </select>
        </div>
        <div class="grid" style="margin-top:10px">
          <label class="mono">streamer duration/max</label>
          <div class="pair">
            <input id="p_streamer_duration" type="number" min="80" max="2000"/>
            <input id="p_streamer_max" type="number" min="2" max="240"/>
          </div>
          <label class="mono">electric duration/max</label>
          <div class="pair">
            <input id="p_electric_duration" type="number" min="80" max="2000"/>
            <input id="p_electric_max" type="number" min="2" max="240"/>
          </div>
          <label class="mono">meteor duration/max</label>
          <div class="pair">
            <input id="p_meteor_duration" type="number" min="80" max="2000"/>
            <input id="p_meteor_max" type="number" min="2" max="240"/>
          </div>
          <label class="mono">tubes duration/max</label>
          <div class="pair">
            <input id="p_tubes_duration" type="number" min="80" max="2000"/>
            <input id="p_tubes_max" type="number" min="2" max="240"/>
          </div>
          <label class="mono">line duration/max</label>
          <div class="pair">
            <input id="p_line_duration" type="number" min="80" max="2000"/>
            <input id="p_line_max" type="number" min="2" max="240"/>
          </div>

          <div class="sep"></div>

          <label class="mono">streamer glow/core/head</label>
          <div class="triple">
            <input id="k_streamer_glow" type="number" step="0.05" min="0.5" max="4"/>
            <input id="k_streamer_core" type="number" step="0.05" min="0.2" max="2"/>
            <input id="k_streamer_head" type="number" step="0.05" min="0.8" max="3"/>
          </div>
          <label class="mono">electric amp/fork</label>
          <div class="pair">
            <input id="k_electric_amp" type="number" step="0.05" min="0.2" max="3"/>
            <input id="k_electric_fork" type="number" step="0.01" min="0" max="0.5"/>
          </div>
          <label class="mono">meteor rate/speed</label>
          <div class="pair">
            <input id="k_meteor_rate" type="number" step="0.01" min="0.2" max="4"/>
            <input id="k_meteor_speed" type="number" step="0.01" min="0.2" max="4"/>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
